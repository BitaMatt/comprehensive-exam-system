name: Build Android APK

on:
  push:
    branches: [ main, android_ver ]
  pull_request:
    branches: [ main, android_ver ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential git cython3 openjdk-11-jdk unzip
        pip install --upgrade pip
        pip install buildozer python-for-android
    
    - name: Debug Android SDK
      run: |
        echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
        ls -la $ANDROID_SDK_ROOT || true
        ls -la $ANDROID_SDK_ROOT/build-tools || true
    - name: Build APK
      run: |
        export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
        export ANDROID_HOME=/usr/local/lib/android/sdk
        export ANDROID_NDK_ROOT=/usr/local/lib/android/sdk/ndk/27.3.13750724
        echo "Buildozer version: $(buildozer --version)"
        echo "Python version: $(python --version)"
        echo "Java version: $(java --version)"
        echo "Android SDK root: $ANDROID_SDK_ROOT"
        echo "Android NDK root: $ANDROID_NDK_ROOT"
        ls -la $ANDROID_SDK_ROOT/build-tools || true
        ls -la $ANDROID_SDK_ROOT/platforms || true
        buildozer android debug -v
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: bin/*.apk
        if-no-files-found: error